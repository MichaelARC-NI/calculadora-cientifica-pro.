<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calculadora científica y financiera con diseño neumórfico. Desarrollada con HTML5, CSS3 y JavaScript puro. Incluye modo oscuro, historial y funciones avanzadas.">
    <meta name="keywords" content="calculadora científica, calculadora web, calculadora neumórfica, HTML5, CSS3, JavaScript, desarrollo web, portafolio, Michael Antonio Rodriguez Condega, calculadora online">
    <meta name="author" content="Michael Antonio Rodriguez Condega">
    
    <title>Calculadora Científica Pro - Michael</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e0e0e0;
            --calc-bg: linear-gradient(145deg, #ffffff, #e6e6e6);
            --text: #333;
            --shadow1: #bebebe;
            --shadow2: #ffffff;
            --accent-green: #27ae60;
            --accent-blue: #3498db;
            --accent-red: #e74c3c;
            --screen-bg: inset 6px 6px 12px #c4c4c4, inset -6px -6px 12px #ffffff;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --calc-bg: linear-gradient(145deg, #1e1e1e, #171717);
            --text: #e0e0e0;
            --shadow1: #0d0d0d;
            --shadow2: #262626;
            --screen-bg: inset 6px 6px 12px #0a0a0a, inset -6px -6px 12px #2a2a2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }
        
        body { 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            padding: 20px;
            color: var(--text);
        }

        .container { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; max-width: 420px; }

        /* Controles Superiores */
        .top-controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0 10px;
        }

        .mode-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: none;
            background: var(--calc-bg);
            box-shadow: 4px 4px 8px var(--shadow1), -4px -4px 8px var(--shadow2);
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            color: var(--text);
        }

        .mode-btn:active { box-shadow: inset 3px 3px 6px var(--shadow1), inset -3px -3px 6px var(--shadow2); }

        /* Calculadora */
        .calc { 
            background: var(--calc-bg); 
            padding: 25px; 
            border-radius: 35px; 
            box-shadow: 20px 20px 60px var(--shadow1), -20px -20px 60px var(--shadow2); 
            width: 100%;
        }

        /* Pantalla */
        .screen {
            background: var(--bg);
            border-radius: 15px;
            padding: 15px;
            box-shadow: var(--screen-bg);
            margin-bottom: 20px;
            border: 2px solid rgba(0,0,0,0.05);
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 8px;
            font-weight: bold;
            font-family: monospace;
        }

        .expression { 
            font-size: 15px; 
            color: var(--accent-blue); 
            text-align: right; 
            min-height: 20px; 
            font-family: 'Share Tech Mono', monospace;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        #display { 
            width: 100%; 
            border: none; 
            background: transparent;
            text-align: right; 
            font-size: 34px; 
            color: var(--text); 
            outline: none;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 2px;
        }

        /* Botones unificados */
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

        .btn { 
            height: 50px; 
            border-radius: 12px; 
            border: none; 
            background: var(--calc-bg); 
            box-shadow: 4px 4px 8px var(--shadow1), -4px -4px 8px var(--shadow2); 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600; 
            color: var(--text);
            display: flex; align-items: center; justify-content: center;
        }

        .btn:active { box-shadow: inset 3px 3px 6px var(--shadow1), inset -3px -3px 6px var(--shadow2); transform: scale(0.95); }
        
        .btn-op { color: #d35400; font-size: 18px; }
        .btn-func { color: var(--accent-blue); font-size: 13px; }
        .btn-mem { color: #8e44ad; font-size: 14px; }
        .btn-clear { background: var(--accent-red); color: white; }
        
        /* Modificación para que el igual ocupe 4 columnas */
        .btn-eq { 
            grid-column: span 4; 
            background: var(--accent-green); 
            color: white; 
            font-size: 24px; 
            height: 55px; /* Ligeramente más alto para destacar */
        }
        
        /* Historial */
        .history-panel {
            width: 100%;
            max-height: 90px;
            overflow-y: auto;
            font-size: 13px;
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(0,0,0,0.05);
            text-align: right;
            font-family: 'Share Tech Mono', monospace;
        }

        .history-panel p { margin-bottom: 5px; opacity: 0.7; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 3px;}

        /* Branding Footer */
        .footer { 
            text-align: center; 
            background: var(--calc-bg); 
            padding: 20px; 
            border-radius: 25px; 
            box-shadow: 10px 10px 30px var(--shadow1), -10px -10px 30px var(--shadow2); 
            width: 100%; 
        }

        .footer h3 { margin-bottom: 15px; font-size: 15px; color: var(--accent-blue); font-weight: bold;}
        
        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .footer a { 
            text-decoration: none; 
            color: var(--text); 
            font-size: 12px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            padding: 10px;
            border-radius: 12px;
            background: var(--bg);
            box-shadow: 3px 3px 6px var(--shadow1), -3px -3px 6px var(--shadow2);
            font-weight: 500;
        }

        .footer a:hover { transform: translateY(-3px); color: var(--accent-blue); }

        /* Estilo especial para destacar YouTube */
        .youtube-btn {
            grid-column: span 2;
            justify-content: center;
            font-size: 14px !important;
        }

        @media (max-width: 400px) {
            .buttons { gap: 8px; }
            .btn { height: 45px; font-size: 14px; }
            #display { font-size: 28px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-controls">
        <button class="mode-btn" onclick="toggleTheme()">🌓 Cambiar Tema</button>
        <button id="deg-rad" class="mode-btn" onclick="toggleDegRad()">Modo: DEG</button>
    </div>

    <div class="calc">
        <div class="screen">
            <div class="info-panel">
                <span id="mode-info">DEG</span>
                <span>FX-PRO MICHAEL</span>
            </div>
            <div id="expression" class="expression"></div>
            <input type="text" id="display" placeholder="0" readonly>
        </div>
        
        <div class="buttons">
            <button class="btn btn-func" onclick="addFunc('sin')">sin</button>
            <button class="btn btn-func" onclick="addFunc('cos')">cos</button>
            <button class="btn btn-func" onclick="addFunc('tan')">tan</button>
            <button class="btn btn-clear" onclick="clearAll()">AC</button>
            
            <button class="btn btn-func" onclick="addFunc('asin')">sin⁻¹</button>
            <button class="btn btn-func" onclick="addFunc('acos')">cos⁻¹</button>
            <button class="btn btn-func" onclick="addFunc('atan')">tan⁻¹</button>
            <button class="btn btn-op" onclick="backspace()">⌫</button>
            
            <button class="btn btn-func" onclick="addFunc('log10')">log</button>
            <button class="btn btn-func" onclick="addFunc('log')">ln</button>
            <button class="btn btn-func" onclick="addFunc('sqrt')">√</button>
            <button class="btn btn-func" onclick="addChar('**')">xʸ</button>

            <button class="btn btn-func" onclick="addFunc('floor')">⌊x⌋</button>
            <button class="btn btn-func" onclick="addFunc('ceil')">⌈x⌉</button>
            <button class="btn btn-func" onclick="addFunc('abs')">|x|</button>
            <button class="btn btn-mem" onclick="addFact()">n!</button>

            <button class="btn btn-func" onclick="addChar('Math.PI')">π</button>
            <button class="btn btn-func" onclick="addChar('Math.E')">e</button>
            <button class="btn btn-func" onclick="addChar('(')">(</button>
            <button class="btn btn-func" onclick="addChar(')')">)</button>

            <button class="btn" onclick="addChar('7')">7</button>
            <button class="btn" onclick="addChar('8')">8</button>
            <button class="btn" onclick="addChar('9')">9</button>
            <button class="btn btn-op" onclick="addChar('/')">÷</button>
            
            <button class="btn" onclick="addChar('4')">4</button>
            <button class="btn" onclick="addChar('5')">5</button>
            <button class="btn" onclick="addChar('6')">6</button>
            <button class="btn btn-op" onclick="addChar('*')">×</button>
            
            <button class="btn" onclick="addChar('1')">1</button>
            <button class="btn" onclick="addChar('2')">2</button>
            <button class="btn" onclick="addChar('3')">3</button>
            <button class="btn btn-op" onclick="addChar('-')">-</button>
            
            <button class="btn" onclick="addChar('0')">0</button>
            <button class="btn" onclick="addChar('.')">.</button>
            <button class="btn btn-mem" onclick="addChar('%')">%</button>
            <button class="btn btn-op" onclick="addChar('+')">+</button>

            <button class="btn btn-eq" onclick="calculate()">=</button>
        </div>

        <div class="history-panel" id="history">
            Historial vacío
        </div>
    </div>

    <div class="footer">
        <h3>Michael Antonio Rodriguez Condega</h3>
        <div class="social-grid">
            <a href="https://youtube.com/@androidmovil" target="_blank" class="youtube-btn">🔴 YouTube: AndroidMovil</a>
            <a href="https://wa.me/message/IABPSKHOKNXLL1" target="_blank">🟢 WhatsApp</a>
            <a href="https://www.tiktok.com/@michaelarc1" target="_blank">⚫ TikTok</a>
            <a href="https://t.me/Michael_Antonio_Rodriguez" target="_blank">🔵 Telegram</a>
            <a href="https://www.facebook.com/share/1BScNU3XgD/" target="_blank">📘 Facebook</a>
        </div>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    const expressionDiv = document.getElementById('expression');
    const historyDiv = document.getElementById('history');
    let isDeg = true;
    let currentExpression = "";

    function toggleTheme() {
        const body = document.body;
        body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function toggleDegRad() {
        isDeg = !isDeg;
        document.getElementById('mode-info').innerText = isDeg ? 'DEG' : 'RAD';
        document.getElementById('deg-rad').innerText = isDeg ? 'Modo: DEG' : 'Modo: RAD';
    }

    function addChar(char) {
        if (display.value === 'Error') clearAll();
        currentExpression += char;
        updateDisplay();
    }

    function addFunc(func) {
        if (display.value === 'Error') clearAll();
        currentExpression += `Math.${func}(`;
        updateDisplay();
    }

    function factorial(n) {
        if (n < 0) return NaN;
        if (n === 0 || n === 1) return 1;
        let res = 1;
        for (let i = 2; i <= n; i++) res *= i;
        return res;
    }

    function addFact() {
        if (display.value === 'Error') clearAll();
        currentExpression += `factorial(`;
        updateDisplay();
    }

    function updateDisplay() {
        let view = currentExpression
            .replace(/Math\.PI/g, 'π')
            .replace(/Math\.E/g, 'e')
            .replace(/Math\./g, '')
            .replace(/factorial\(/g, 'fact(')
            .replace(/\*\*+/g, '^');
        display.value = view || "0";
    }

    function calculate() {
        try {
            if(currentExpression.trim() === "") return;
            let evalExp = currentExpression;
            
            evalExp = evalExp.replace(/%/g, '/100');

            if (isDeg) {
                evalExp = evalExp.replace(/sin\(([^)]+)\)/g, 'sin(($1) * Math.PI / 180)');
                evalExp = evalExp.replace(/cos\(([^)]+)\)/g, 'cos(($1) * Math.PI / 180)');
                evalExp = evalExp.replace(/tan\(([^)]+)\)/g, 'tan(($1) * Math.PI / 180)');
                
                evalExp = evalExp.replace(/asin\(([^)]+)\)/g, '(asin($1) * 180 / Math.PI)');
                evalExp = evalExp.replace(/acos\(([^)]+)\)/g, '(acos($1) * 180 / Math.PI)');
                evalExp = evalExp.replace(/atan\(([^)]+)\)/g, '(atan($1) * 180 / Math.PI)');
            }

            let result = eval(evalExp);
            if (isNaN(result) || !isFinite(result)) throw new Error();

            result = parseFloat(result.toFixed(8));
            
            let view = display.value;
            addToHistory(view + " = " + result);
            
            expressionDiv.innerText = view + " =";
            display.value = result;
            currentExpression = result.toString();
        } catch (e) {
            display.value = "Error";
            setTimeout(clearAll, 1500);
        }
    }

    function addToHistory(item) {
        if (historyDiv.innerText.includes("vacío")) historyDiv.innerHTML = "";
        const p = document.createElement('p');
        p.innerText = item;
        historyDiv.prepend(p);
    }

    function clearAll() {
        display.value = "0";
        currentExpression = "";
        expressionDiv.innerText = "";
    }

    function backspace() {
        currentExpression = currentExpression.slice(0, -1);
        updateDisplay();
    }

    document.addEventListener('keydown', (e) => {
        if (e.key >= '0' && e.key <= '9' || ['+', '-', '*', '/', '.', '(', ')', '%'].includes(e.key)) addChar(e.key);
        if (e.key === 'Enter') { e.preventDefault(); calculate(); }
        if (e.key === 'Backspace') backspace();
        if (e.key === 'Escape') clearAll();
    });
</script>

</body>
</html>
